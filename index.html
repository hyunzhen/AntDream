<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>개미의 꿈 🐜</title>
<style>
:root{
  --bg:#f8f9fa;--card:#fff;--border:#e2e8f0;
  --text:#1e2130;--sub:#6b7280;
  --up:#e53e3e;--down:#3182ce;--flat:#a0aec0;
  --accent:#f6c90e;--colony:#7c5cbf;--green:#38a169;
  --r:12px;--sh:0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* 화면 */
.screen{display:none;flex-direction:column;min-height:100vh;
  max-width:480px;margin:0 auto;padding-bottom:76px}
.screen.active{display:flex}

/* 상단바 */
.top-bar{position:sticky;top:0;z-index:10;background:var(--card);
  border-bottom:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;gap:8px}
.day-lbl{font-size:18px;font-weight:800;color:var(--colony)}
.colony-chip{background:#f3f0ff;color:var(--colony);
  font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.asset-chip{margin-left:auto;background:#fffbeb;color:#92400e;
  font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.help-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--bg);color:var(--sub);font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-left:6px;transition:all .12s}
.help-btn:active{background:var(--colony);color:#fff;border-color:var(--colony)}

/* 식량 설명 태그 */
.food-tag{font-size:10px;padding:2px 7px;border-radius:10px;
  background:#f3f4f6;color:var(--sub);font-weight:600;white-space:nowrap}
.food-tag.danger{background:#fed7d7;color:#9b2c2c}
.food-tag.safe{background:#c6f6d5;color:#276749}
.food-tag.special{background:#fefcbf;color:#744210}

/* 소문 영향 식량 강조 */
.food-row.hot{background:#fffef5;border-left:3px solid #f59e0b;padding-left:11px}
.rumor-dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;
  display:inline-block;flex-shrink:0;align-self:center;margin-left:2px}

/* 인라인 구입 컨트롤 (아코디언) */
.food-buy-inline{padding:10px 14px 12px;background:#f5f3ff;
  border-bottom:1px solid var(--border)}
.fbi-controls{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.fbi-cost{font-size:12px;color:var(--sub);margin-bottom:8px}

/* DAY 1 시작 메시지 */
.welcome-msg{margin:10px 16px 0;background:#f5f3ff;border:1.5px solid #a78bfa;
  border-radius:10px;padding:11px 14px;font-size:13px;color:var(--colony);line-height:1.6}

/* 소문 접기/펼치기 */
.rum-toggle{float:right;font-size:10px;font-weight:700;color:var(--sub);
  background:none;border:none;cursor:pointer;padding:0}

/* 섹션 카드 */
.sec{margin:10px 16px 0;background:var(--card);border-radius:var(--r);
  box-shadow:var(--sh);overflow:hidden}
.sec-hd{padding:9px 14px 7px;font-size:11px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;color:var(--sub);
  border-bottom:1px solid var(--border)}

/* 소문 아이템 */
.rumor-row{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-start}
.rumor-row:last-child{border-bottom:none}
.rumor-txt{flex:1;font-size:13px;line-height:1.5}
.rumor-hint{font-size:12px;color:var(--accent);flex-shrink:0}
.rumor-bdg{font-size:10px;padding:2px 7px;border-radius:10px;
  flex-shrink:0;align-self:center;font-weight:700}
.bdg-pos{background:#c6f6d5;color:#276749}
.bdg-neg{background:#fed7d7;color:#9b2c2c}
.bdg-mix{background:#fefcbf;color:#744210}
.bdg-rum{background:#feebc8;color:#7b341e}
.bdg-blind{background:#e2e8f0;color:#4a5568}

/* 가격 변동 리스트 */
.chg-row{padding:9px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px}
.chg-row:last-child{border-bottom:none}
.chg-em{font-size:22px;flex-shrink:0}
.chg-nm{font-size:13px;font-weight:600;flex:1}
.chg-pr{font-size:11px;color:var(--sub)}
.chg-pct{font-size:14px;font-weight:800;min-width:54px;text-align:right}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}

/* 포트폴리오 행 (아침 매도) */
.port-row{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.port-row:last-child{border-bottom:none}
.port-row.sel,.port-row:active{background:#f3f0ff}
.port-val{margin-left:auto;font-size:12px;font-weight:600;color:var(--colony)}

/* 식량 행 (낮 매수) */
.food-row{padding:10px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
.food-row:last-child{border-bottom:none}
.food-row.sel,.food-row:active{background:#f3f0ff}
.food-em{font-size:22px;width:30px;text-align:center;flex-shrink:0}
.food-nm{font-size:13px;font-weight:600}
.food-own{font-size:11px;color:var(--sub)}
.food-pr{font-size:13px;font-weight:700}
.food-chg{font-size:11px;font-weight:600}

/* 거래 패널 */
.trade-panel{margin:10px 16px 0;background:var(--card);
  border-radius:var(--r);box-shadow:var(--sh);padding:14px}
.tp-name{font-size:16px;font-weight:800;margin-bottom:3px}
.tp-sub{font-size:12px;color:var(--sub);margin-bottom:12px}
.qty-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.btn-sm{padding:5px 11px;border:1.5px solid var(--border);border-radius:6px;
  font-size:12px;font-weight:600;background:var(--bg);color:var(--text);
  cursor:pointer;transition:all .12s}
.btn-sm:active{background:#f3f0ff;border-color:var(--colony)}
.qty-num{font-size:18px;font-weight:800;color:var(--colony);
  min-width:32px;text-align:center}
.btn-cir{width:30px;height:30px;border-radius:50%;
  border:1.5px solid var(--colony);background:var(--bg);color:var(--colony);
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .12s}
.btn-cir:active{background:var(--colony);color:#fff}
.tp-cost{font-size:12px;color:var(--sub);margin-bottom:10px}
.btn-trade{width:100%;padding:13px;border:none;border-radius:8px;
  font-size:15px;font-weight:700;cursor:pointer;transition:.12s}
.btn-sell-c{background:var(--down);color:#fff}
.btn-buy-c{background:var(--up);color:#fff}
.btn-trade:active{opacity:.85}
.btn-trade:disabled{background:var(--border);color:var(--sub);cursor:not-allowed}

/* 굴 진행바 */
.colony-bar{margin:10px 16px 0}
.stage-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip-done{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--colony);color:#fff}
.chip-next{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  background:#f3f0ff;color:var(--colony);border:1px dashed var(--colony)}
.chip-lock{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;
  background:var(--border);color:var(--sub)}
.prog-wrap{background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.prog-fill{height:100%;background:var(--colony);border-radius:4px;transition:width .5s}
.prog-lbl{font-size:11px;color:var(--sub);margin-top:4px}

/* 하단 고정바 */
.bot-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--card);
  border-top:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;gap:10px;z-index:10}
.cash-lbl{font-size:13px;color:var(--sub)}
.cash-amt{font-size:14px;font-weight:700;color:var(--colony)}
.btn-main{margin-left:auto;padding:11px 20px;background:var(--colony);
  color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;
  cursor:pointer;white-space:nowrap}
.btn-main:active{opacity:.85}
.btn-full{width:100%;padding:14px;background:var(--colony);color:#fff;
  border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.btn-full:active{opacity:.85}

/* 배당 공지 */
.dividend-box{margin:10px 16px 0;background:#fffbeb;
  border:1.5px solid #fbbf24;border-radius:var(--r);
  padding:10px 14px;font-size:13px;font-weight:600;color:#92400e}

/* 요약 카드 */
.summary{padding:14px}
.sum-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.sum-lbl{font-size:12px;color:var(--sub)}
.sum-val{font-size:14px;font-weight:700}
.ant-msg{margin-top:10px;padding:10px 12px;background:var(--bg);
  border-radius:8px;font-size:13px;line-height:1.6;
  border-left:3px solid var(--colony)}

/* 타이틀 */
.title-wrap{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;text-align:center}
.t-ant{font-size:72px;margin-bottom:12px}
.t-name{font-size:28px;font-weight:900;color:var(--colony);margin-bottom:8px}
.t-sub{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:20px}
.t-tip{font-size:12px;color:var(--flat);margin-top:12px}

/* 엔딩 */
.end-wrap{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;text-align:center}
.end-icon{font-size:64px;margin-bottom:12px}
.end-title{font-size:24px;font-weight:900;color:var(--colony);margin-bottom:8px}
.end-sub{font-size:14px;color:var(--sub);line-height:1.8;white-space:pre-line;margin-bottom:24px}

/* 공유 팝업 */
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.popup-box{background:var(--card);border-radius:var(--r);
  padding:20px;width:100%;max-width:360px}
.share-pre{font-family:monospace;font-size:13px;line-height:1.7;
  background:var(--bg);border-radius:8px;padding:12px;
  margin-bottom:12px;white-space:pre-wrap;word-break:break-word}
.btn-copy{width:100%;padding:12px;background:var(--colony);color:#fff;
  border:none;border-radius:8px;font-size:14px;font-weight:700;
  cursor:pointer;margin-bottom:8px}
.btn-close-p{width:100%;padding:11px;background:var(--bg);color:var(--text);
  border:1.5px solid var(--border);border-radius:8px;
  font-size:14px;font-weight:600;cursor:pointer}
